pre-commit:
  commands:
    format:
      glob: "**/*.{js,mjs,ts,mts,jsx,tsx,json,grit}"
      run: pnpm biome check --no-errors-on-unmatched --files-ignore-unknown=true --write {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: pnpm typecheck
    coverage:
      run: pnpm coverage
